services:
  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: 'pg-vnext-timescale'
    ports:
      - '5435:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mastra}
    # Match the main docker-compose.yaml headroom so parallel vitest workers
    # exercising hypertable init() don't trip the default max_connections=100
    # or hit "out of shared memory" under concurrent partition creation.
    command:
      - 'postgres'
      - '-c'
      - 'max_connections=300'
      - '-c'
      - 'max_locks_per_transaction=256'
    volumes:
      - pgdata-timescale:/var/lib/postgresql/data

  partman:
    image: huntress/postgres-partman:18.3
    container_name: 'pg-vnext-partman'
    ports:
      - '5436:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mastra}
    command:
      - 'postgres'
      - '-c'
      - 'max_connections=300'
      - '-c'
      - 'max_locks_per_transaction=256'
    volumes:
      - pgdata-partman:/var/lib/postgresql

volumes:
  pgdata-timescale:
  pgdata-partman:
