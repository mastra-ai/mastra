services:
  mongodb-storage:
    # Pinned to 7.x: MongoDB 8.x fatally refuses to start on Linux kernel 6.19+
    # (TCMalloc rseq incompatibility, SERVER-121912), which is what the CI runner
    # fleet runs. Do not bump back to 8.x until MongoDB ships a patched TCMalloc.
    image: mongo:7.0.37
    container_name: 'mongodb-storage-test-db'
    ports:
      - '27017:27017'
    volumes:
      # v7 suffix: mongod 7.x cannot open a data dir created by 8.x, so reusing
      # the old `mongodbdata` volume would fail on machines that ran 8.3.4.
      - mongodbdata-v7:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 3s
  mongodb-vector:
    # Pinned to 8.2: $rankFusion (used by hybridQuery) requires MongoDB >= 8.1.
    image: mongodb/mongodb-atlas-local:8.2
    container_name: 'mongodb-vector-test-db'
    environment:
      MONGODB_INITDB_ROOT_USERNAME: mongodb
      MONGODB_INITDB_ROOT_PASSWORD: mongodb
    ports:
      - 27018:27017
    healthcheck:
      test: ['CMD', 'mongosh', '-u', 'mongodb', '-p', 'mongodb', '--eval', "db.adminCommand('ping')"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 3s
volumes:
  mongodbdata-v7:
