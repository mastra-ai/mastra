---
extends: existence
message: "AI overused verb: '%s'. Name the shortfall or the membership directly. Disable this rule for gravity or weather prose."
level: error
nonword: true
ignorecase: true
# "Falls" is an AI fingerprint for shortcoming, membership, and neglect: a
# result "falls short," a design "falls apart," a case "falls under" a
# category, a task "falls by the wayside." Literal falling is everywhere
# (prices, temperature, night, people, rain), so the complement after the
# verb is the discriminator, in the FigurativeSits mold. Each token curates
# a figurative sense, so "the price fell sharply" and "night falls" stay
# quiet. The past-tense "things fell into place" stays in NarrativePivots;
# the tokens here keep to the present so the two rules never double-flag.
tokens:
  # --- Shortcoming: the artifact misses the mark or disintegrates ("falls
  # short," "falls flat," "falls apart," "falls through"). "Falls short"
  # can be literal in archery or ballistics; disable the rule there.
  - "\\bfall(?:s|ing)? short\\b"
  - "\\bfall(?:s|ing)? flat\\b"
  - "\\bfall(?:s|ing)? apart\\b"
  - "\\bfall(?:s|ing)? to pieces\\b"
  - "\\bfall(?:s|ing)? through(?:\\b|$)"
  - "\\bfall(?:s|ing)? behind\\b"

  # --- Membership and placement: a case sorted into a bin by falling
  # ("falls under," "falls within scope," "falls outside the remit,"
  # "falls into place," "falls into the trap of"). The grouping-by-cardinal
  # shape ("falls into three categories") stays in CataphoricForecasting.
  - "\\bfall(?:s|ing)? under (?:the (?:category|heading|umbrella|banner|purview|remit|scope|rubric)|\\w+ jurisdiction)\\b"
  - "\\bfall(?:s|ing)? (?:squarely |neatly |cleanly |broadly )?within (?:the )?(?:scope|remit|purview|bounds|category|realm|domain|ambit)\\b"
  - "\\bfall(?:s|ing)? outside (?:the )?(?:scope|remit|purview|bounds|category|realm|domain)\\b"
  - "\\bfall(?:s|ing)? into place\\b"
  - "\\bfall(?:s|ing)? into line\\b"
  - "\\bfall(?:s|ing)? into the (?:trap|habit|pattern|category) of\\b"

  # --- Duty assignment: a burden lands on someone by falling. The curated
  # abstract subject is the gate, so "the ball falls to the floor" and
  # "prices fall to a new low" stay quiet.
  - "\\b(?:responsibility|responsibilities|the task|the job|the duty|the burden|the onus|the decision|the choice|the call|the blame|the work|it all) falls? (?:to|on|upon)\\b"

  # --- Neglect: the artifact slips out of care ("falls by the wayside,"
  # "falls through the cracks," "falls on deaf ears," "falls out of favor,"
  # "falls off the radar").
  - "\\bfall(?:s|ing)? by the wayside\\b"
  - "\\bfall(?:s|ing)? through the cracks\\b"
  - "\\bfall(?:s|ing)? on deaf ears\\b"
  - "\\bfall(?:s|ing)? out of (?:favor|favour|use|fashion|style)\\b"
  - "\\bfall(?:s|ing)? off (?:the|a) (?:radar|cliff|map|table|rails)\\b"
  - "\\bfall(?:s|ing)? into (?:disrepair|disuse|obscurity|oblivion|neglect)\\b"

  # --- Prey and capitulation ("falls victim to," "falls prey to," "falls
  # by the sword").
  - "\\bfall(?:s|ing)? (?:victim|prey) to\\b"
