StylesPath = styles

MinAlertLevel = suggestion

Vocab = Mastra

# Packages (synced with `vale sync`)
Packages = write-good, https://github.com/tbhb/vale-ai-tells/releases/download/v1.24.0/ai-tells.zip

# Only lint English content (excluding auto-generated models)
# Native MDX support via mdx2vast (must be installed globally: npm i -g mdx2vast)
[src/content/en/{docs,guides,reference}/**/*.{md,mdx}]
BasedOnStyles = Vale, write-good, Mastra, signs-of-ai-writing, ai-tells

# Disable rules
write-good.E-Prime = NO
write-good.Passive = NO
write-good.TooWordy = NO
ai-tells.AnnouncementHeadings = NO
ai-tells.ColonUsage = NO
ai-tells.FormalRegister = NO
ai-tells.FormalTransitions = NO

# Disable Spelling check, potentially enable in the future with a custom dictionary in accept.txt
Vale.Spelling = NO
