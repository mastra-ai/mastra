# Standalone install root, linked against the monorepo packages.

# Share pnpm's virtual store with the monorepo so native modules (LiveKit WebRTC,
# onnxruntime) resolve to one physical copy instead of loading twice.
enableGlobalVirtualStore: true

overrides:
  '@mastra/core': 'link:../../packages/core'
  '@mastra/libsql': 'link:../../stores/libsql'
  '@mastra/memory': 'link:../../packages/memory'
  '@mastra/observability': 'link:../../observability/mastra'
  mastra: 'link:../../packages/cli'

# @huggingface/transformers (turn-detector dependency) imports onnxruntime-common
# without declaring it; declare it so strict/global-store resolution can find it.
packageExtensions:
  '@huggingface/transformers@*':
    dependencies:
      onnxruntime-common: '*'

allowBuilds:
  esbuild: true
