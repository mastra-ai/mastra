packages:
  - mastracode/sdk
  - mastracode/tui
  - mastracode/factory
  - mastracode/mastra-factory
  - docs
  - packages/_vendored/*
  - packages/_internals/*
  - packages/*
  - embedders/*
  - agent-sdks/*
  - deployers/*
  - stores/*
  - browser/*
  - voice/*
  - examples/voice/aws-nova-sonic-test
  - workflows/*
  - workspaces/*
  - signals/*
  - server-adapters/*
  - pubsub/*
  - client-sdks/*
  - integrations/*
  - auth/*
  - observability/*
  - channels/*
  - explorations/longmemeval
  - explorations/agent-builder-gh-repro
  - e2e-tests/client-js/_test-utils
  - e2e-tests/client-js/zod-v3
  - e2e-tests/client-js/zod-v4
  - e2e-tests/workspace-compat

# Share pnpm's virtual store across git worktrees: https://pnpm.io/git-worktrees
enableGlobalVirtualStore: true

catalog:
  '@microsoft/api-extractor': ^7.57.7
  '@vitest/coverage-v8': 4.1.10
  '@vitest/ui': 4.1.10
  date-fns: 4.4.0
  react: ^19.2.5
  react-dom: ^19.2.5
  typescript: ^6.0.3
  vitest: 4.1.10
  zod: ^4.4.3
  tsx: ^4.23.1

patchedDependencies:
  '@changesets/get-dependents-graph@2.1.4': patches/@changesets__get-dependents-graph@2.1.4.patch
  '@earendil-works/pi-tui@0.80.6': patches/@earendil-works__pi-tui@0.80.6.patch
  tsup@8.5.1: patches/tsup@8.5.1.patch

packageExtensions:
  '@ai-sdk/provider-utils@3.0.25':
    dependencies:
      msw: ^2.12.11
      # Must track the catalog `vitest` version (above). The published
      # `@ai-sdk/provider-utils/test` entrypoint loads vitest's snapshot
      # client; if this resolves to a different vitest than the workspace,
      # a second SnapshotClient is created and every toMatchSnapshot() in
      # tests that import from that entrypoint fails. Keep these in sync.
      vitest: 4.1.8
  '@ai-sdk/provider-utils@3.0.28':
    dependencies:
      msw: ^2.12.11
      # See the note on the 3.0.25 entry — must track the catalog `vitest`.
      vitest: 4.1.10
  '@uiw/codemirror-theme-dracula@*':
    dependencies:
      '@babel/runtime': ^7.29.2
      '@lezer/highlight': ^1.2.3
  '@arcadeai/arcadejs@^2.3.0':
    dependencies:
      zod: ^3.0.0
  # transformers.js imports onnxruntime-common without declaring it; with the
  # global virtual store there is no fallback hoist, so the import fails at
  # runtime (hit via @livekit/agents-plugin-livekit's turn detector).
  '@huggingface/transformers@*':
    dependencies:
      onnxruntime-common: '*'
  # @daytonaio/sdk requires tslib at runtime without declaring it; with the
  # global virtual store there is no fallback hoist, so importing the SDK
  # fails with "Cannot find module 'tslib'".
  '@daytonaio/sdk@*':
    dependencies:
      tslib: '*'

blockExoticSubdeps: true
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200 # 30 days
minimumReleaseAge: 1440 # 1 day
minimumReleaseAgeExclude:
  # Exclude our own published packages so snapshot/canary e2e flows can install
  # versions immediately after publishing in CI. The minimumReleaseAge gate is
  # intended as a supply-chain defense for third-party dependencies.
  - '@mastra/*'
  - '@internal/*'
  - 'mastra'
  - 'create-mastra'
  - 'mastracode'
  - '@earendil-works/pi-tui'
  - railway@3.3.1
  # Turso-recommended busy_timeout fix (libsql-client-ts#288/#345). Adopted
  # immediately on their guidance; pinned so the release-age gate still applies
  # to any later @libsql/client versions.
  - '@libsql/client@0.17.4'
  - '@libsql/core@0.17.4'
  # AI SDK v7 (LanguageModelV4) support. These were adopted on release day, so
  # they are pinned to exact versions to clear the release-age gate while still
  # applying it to any later AI SDK v7 releases.
  - 'ai@7.0.0'
  - '@ai-sdk/provider@4.0.0'
  - '@ai-sdk/provider-utils@5.0.0'
  - '@ai-sdk/gateway@4.0.0'
  - '@ai-sdk/openai@4.0.0'
  - '@ai-sdk/anthropic@4.0.0'
  - '@ai-sdk/google@4.0.0'
  # Renovate security update: shell-quote@1.10.0
  - shell-quote@1.10.0
  # Renovate security update: tmp@0.2.7
  - tmp@0.2.7
  # Renovate security update: axios@1.18.0
  - axios@1.18.0
  # Renovate security update: body-parser@2.3.0
  - body-parser@2.3.0
  # Renovate security update: protobufjs@8.6.6 || 7.6.5
  - protobufjs@8.6.6 || 7.6.5
  # Renovate security update: tar@7.5.19
  - tar@7.5.19
  # Renovate security update: webpack-dev-server@5.2.6
  - webpack-dev-server@5.2.6
  # Renovate security update: dompurify@3.4.12
  - dompurify@3.4.12
  # Renovate security update: fast-uri@3.1.4
  - fast-uri@3.1.4
  # Renovate security update: fast-xml-parser@5.10.1
  - fast-xml-parser@5.10.1
  # Renovate security update: svgo@3.3.4
  - svgo@3.3.4
  # Renovate security update: @hono/node-server@2.0.10
  - "@hono/node-server@2.0.10"
trustPolicyExclude:
  # Security fix for GHSA middleware-based route protection bypass (CVE).
  # 3.47.4 is published with provenance attestation rather than trusted publisher,
  # but it is the official fix published on the @clerk/shared latest-v5 tag.
  - '@clerk/shared@3.47.4'
  # Renovate cannot refresh lockfiles while pnpm rejects these official package
  # versions as trust downgrades.
  - 'effect@4.0.0-beta.59'
  - 'tinyexec@1.2.2'
  # 0.7.4 is published with provenance attestation rather than trusted publisher.
  - 'prettier-plugin-tailwindcss@0.7.4'
  # Required for the Mesa workspace filesystem provider. 0.38.0 is published
  # without the trusted-publisher evidence that older @mesadev/sdk versions had.
  - '@mesadev/sdk@0.38.0'
overrides:
  typescript: ^6.0.3
  '@types/node': 22.19.15
  # Capped below 2: cookie@2 renamed parse/serialize to parseCookie/stringifyCookie,
  # which breaks react-router's build when renovate's pnpm dedupe floats it up.
  cookie: '>=1.1.1 <2'
  tmp: '>=0.2.7'
  jsondiffpatch: '>=0.7.3'
  ssri: '>=6.0.2'
  jws: ^4.0.1
  client-js-e2e-tests-zod-v3>zod: ^3.24.0
  client-js-e2e-tests-zod-v4>zod: ^4.3.6
  # >=1.6.13 fixes stored XSS via javascript: redirect_uri in oidc-provider/mcp
  # (GHSA Dependabot alert #2266).
  better-auth: ^1.6.13
  js-yaml: ^3.15.0
  glob@<=10.5.0: 10.5.0
  # image-size 2.x (incl. 2.0.2 latest) has unpatched DoS infinite-loop flaws
  # (CVE-2025-71330 / GHSA-w3rx-r6r6-pgpr). No fixed 2.x exists, so pin to the
  # maintained legacy 1.2.1 release, which predates the vulnerable code paths
  # and is API-compatible (default imageSize(buffer) usage). See issue #17975.
  # Scoped to @mastra/memory only — a global override breaks the docs build,
  # which relies on the `image-size/fromFile` subpath export added in 2.x.
  '@mastra/memory>image-size': 1.2.1
  body-parser@<=2.2.1: 2.3.0
  inngest: ^4.2.2
  fast-xml-parser@<5.5.7: ^5.10.1
  langsmith@<0.6.0: ^0.6.0
  lodash@<=4.17.23: ^4.18.0
  prismjs@<1.30.0: ^1.30.0
  serialize-javascript@<7.0.5: ^7.0.5
  # Security floors for Dependabot alerts (transitive deps; patched versions
  # are within the parents' declared ranges).
  simple-git@<3.36.0: 3.36.0
  axios@>=1.0.0 <1.16.0: 1.18.0
  protobufjs@>=7.0.0 <7.6.3: 7.6.5
  protobufjs@>=8.0.0 <8.6.0: 8.6.6
  minimatch@>=5.0.0 <5.1.8: 5.1.8
  minimatch@>=9.0.0 <9.0.7: 9.0.7
  ws@>=8.0.0 <8.21.0: 8.21.0
  webpack-dev-server@<5.2.5: 5.2.6
  qs@>=6.7.0 <6.15.2: 6.15.2
  fast-uri@<3.1.2: 3.1.4
  form-data@<2.5.6: 2.5.6
  form-data@>=4.0.0 <4.0.6: 4.0.6
  brace-expansion@<1.1.13: 1.1.13
  brace-expansion@>=2.0.0 <2.0.3: 2.0.3
  '@clerk/shared@>=3.0.0 <3.47.5': 3.47.7
  js-cookie@>=3.0.0 <3.0.7: 3.0.7
  path-to-regexp@<0.1.13: 0.1.13
  joi@>=17.0.0 <17.13.4: 17.13.4
  svgo@>=3.0.0 <3.3.3: 3.3.4
  # undici 5.x has no patched release (fixes land in 6.23+); the only 5.x
  # consumer is @connectrpc/connect-node@1.7.0 (via @cursor/sdk), which is
  # compatible with the undici 6 Client/Pool APIs.
  undici@<6.0.0: 6.27.0
  undici@>=6.0.0 <6.27.0: 6.27.0
  undici@>=7.0.0 <7.28.0: 7.28.0
  multer@<2.2.0: 2.2.0
  '@hey-api/openapi-ts@<0.97.3': 0.97.3
  '@opentelemetry/core@>=2.0.0 <2.8.0': 2.8.0
  '@opentelemetry/sdk-node@<0.217.0': 0.217.0
  '@opentelemetry/exporter-prometheus@<0.217.0': 0.217.0
  uuid@>=13.0.0 <13.0.1: 13.0.1
  # uuid <11.1.1 and tar <7.5.16 are pinned by transitive parents on old
  # majors (msal-node/google-gax/etc. declare uuid ^8-^10; the sqlite3
  # install chain declares tar ^6). Both keep the APIs those parents use.
  uuid@<11.1.1: 11.1.1
  tar@<7.5.16: 7.5.19
  http-proxy-middleware@>=0.16.0 <2.0.10: 2.0.10
  launch-editor@<2.14.1: 2.14.1
  mdast-util-to-hast@>=13.0.0 <13.2.1: 13.2.1
  websocket-driver@<0.7.5: 0.7.5
  '@babel/core@>=7.0.0 <7.29.6': 8.0.1
  '@babel/plugin-transform-modules-systemjs@>=7.12.0 <7.29.4': 8.0.1
  dompurify@>=3.0.0 <3.4.11: 3.4.12
  '@tootallnate/once@<3.0.1': ^3.0.1
  '@codemirror/lang-jinja': ^6.0.1
  'aggregate-error': 'npm:@socketregistry/aggregate-error@^1'
  'array-buffer-byte-length': 'npm:@socketregistry/array-buffer-byte-length@^1'
  'array-flatten': 'npm:@socketregistry/array-flatten@^1'
  'array-includes': 'npm:@socketregistry/array-includes@^1'
  'array.prototype.findlast': 'npm:@socketregistry/array.prototype.findlast@^1'
