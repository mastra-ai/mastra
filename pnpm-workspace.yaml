packages:
  - mastracode
  - docs
  - packages/_vendored/*
  - packages/_internals/*
  - packages/*
  - deployers/*
  - stores/*
  - browser/*
  - voice/*
  - examples/voice/aws-nova-sonic-test
  - workflows/*
  - workspaces/*
  - server-adapters/*
  - pubsub/*
  - client-sdks/*
  - integrations/*
  - auth/*
  - observability/*
  - channels/*
  - explorations/longmemeval
  - explorations/agent-builder-gh-repro
  - e2e-tests/client-js/_test-utils
  - e2e-tests/client-js/zod-v3
  - e2e-tests/client-js/zod-v4
  - e2e-tests/workspace-compat

# Share pnpm's virtual store across git worktrees: https://pnpm.io/git-worktrees
enableGlobalVirtualStore: true

catalog:
  '@microsoft/api-extractor': ^7.57.7
  '@vitest/coverage-v8': 4.1.5
  '@vitest/ui': 4.1.5
  date-fns: 4.1.0
  react: ^19.2.5
  react-dom: ^19.2.5
  typescript: ^6.0.3
  vitest: 4.1.5
  zod: ^4.4.3

patchedDependencies:
  '@changesets/get-dependents-graph@2.1.4': patches/@changesets__get-dependents-graph@2.1.4.patch
  tsup@8.5.1: patches/tsup@8.5.1.patch

packageExtensions:
  '@ai-sdk/provider-utils@3.0.25':
    dependencies:
      msw: ^2.12.11
      vitest: 4.1.5
  '@uiw/codemirror-theme-dracula@*':
    dependencies:
      '@babel/runtime': ^7.29.2
      '@lezer/highlight': ^1.2.3
  '@arcadeai/arcadejs@^2.3.0':
    dependencies:
      zod: ^3.0.0

blockExoticSubdeps: true
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200 # 30 days
minimumReleaseAge: 1440 # 1 day
minimumReleaseAgeExclude:
  # Exclude our own published packages so snapshot/canary e2e flows can install
  # versions immediately after publishing in CI. The minimumReleaseAge gate is
  # intended as a supply-chain defense for third-party dependencies.
  - '@mastra/*'
  - '@internal/*'
  - 'mastra'
  - 'create-mastra'
trustPolicyExclude:
  # Security fix for GHSA middleware-based route protection bypass (CVE).
  # 3.47.4 is published with provenance attestation rather than trusted publisher,
  # but it is the official fix published on the @clerk/shared latest-v5 tag.
  - '@clerk/shared@3.47.4'
  # Renovate cannot refresh lockfiles while pnpm rejects these official package
  # versions as trust downgrades.
  - 'effect@4.0.0-beta.59'
  - 'tinyexec@1.2.2'
  # 0.7.4 is published with provenance attestation rather than trusted publisher.
  - 'prettier-plugin-tailwindcss@0.7.4'
overrides:
  typescript: ^6.0.3
  '@types/node': 22.19.15
  cookie: '>=1.1.1'
  tmp: '>=0.2.6'
  jsondiffpatch: '>=0.7.3'
  ssri: '>=6.0.2'
  jws: ^4.0.1
  client-js-e2e-tests-zod-v3>zod: ^3.24.0
  client-js-e2e-tests-zod-v4>zod: ^4.3.6
  js-yaml: ^3.14.2
  glob@<=10.5.0: 10.5.0
  body-parser@<=2.2.1: 2.2.2
  inngest: ^4.2.2
  fast-xml-parser@<5.5.7: ^5.7.1
  lodash@<=4.17.23: ^4.18.0
  prismjs@<1.30.0: ^1.30.0
  serialize-javascript@<7.0.5: ^7.0.5
  '@tootallnate/once@<3.0.1': ^3.0.1
  '@codemirror/lang-jinja': ^6.0.1
  # Dependabot security remediation (GHSA advisories) - pin transitives to first patched version
  # opensearch malware advisory GHSA-298w-vvm4-ww55 is over-broad (>=0); compromised builds are 3.5.3/3.6.2/3.7.0/3.8.0.
  # We resolve 3.5.1 (safe); cap below 3.5.3 so a future install cannot pull a malicious build.
  '@opensearch-project/opensearch@>=3.5.3': 3.5.1
  '@babel/plugin-transform-modules-systemjs@>=7.0.0 <7.29.4': ^7.29.4
  '@clerk/shared@>=3.0.0 <3.47.5': ^3.47.5
  '@fastify/static@>=9.0.0 <9.1.1': ^9.1.1
  '@opentelemetry/auto-instrumentations-node@>=0.0.0 <0.75.0': ^0.75.0
  '@opentelemetry/exporter-prometheus@>=0.0.0 <0.217.0': ^0.217.0
  '@opentelemetry/sdk-node@>=0.0.0 <0.217.0': ^0.217.0
  '@protobufjs/utf8@>=1.0.0 <1.1.1': ^1.1.1
  'ajv@>=7.0.0 <8.18.0': ^8.18.0
  'axios@>=1.0.0 <1.16.0': ^1.16.0
  'brace-expansion@>=1.0.0 <1.1.13': ^1.1.13
  'brace-expansion@>=2.0.0 <2.0.3': ^2.0.3
  'brace-expansion@>=5.0.0 <5.0.6': ^5.0.6
  'defu@>=6.0.0 <6.1.5': ^6.1.5
  'fast-uri@>=3.0.0 <3.1.2': ^3.1.2
  'file-type@>=21.0.0 <21.3.2': ^21.3.2
  'follow-redirects@>=1.0.0 <1.16.0': ^1.16.0
  'ip-address@>=10.0.0 <10.1.1': ^10.1.1
  'js-cookie@>=3.0.0 <3.0.7': ^3.0.7
  'kysely@>=0.0.0 <0.28.17': ^0.28.17
  'langsmith@<0.6.0': ^0.6.0
  'lodash-es@>=4.0.0 <4.18.0': ^4.18.0
  'mdast-util-to-hast@>=13.0.0 <13.2.1': ^13.2.1
  'minimatch@>=5.0.0 <5.1.8': ^5.1.8
  'minimatch@>=7.0.0 <7.4.8': ^7.4.8
  'minimatch@>=9.0.0 <9.0.7': ^9.0.7
  'minimatch@>=10.0.0 <10.2.3': ^10.2.3
  'multer@>=2.0.0 <2.1.1': ^2.1.1
  'path-to-regexp@>=0.0.0 <0.1.13': ^0.1.13
  'path-to-regexp@>=8.0.0 <8.4.0': ^8.4.0
  'picomatch@>=2.0.0 <2.3.2': ^2.3.2
  'picomatch@>=4.0.0 <4.0.4': ^4.0.4
  'protobufjs@>=7.0.0 <7.5.8': ^7.5.8
  'protobufjs@>=8.0.0 <8.2.0': ^8.2.0
  'qs@>=6.0.0 <6.15.2': ^6.15.2
  'simple-git@>=3.0.0 <3.36.0': ^3.36.0
  'svgo@>=3.0.0 <3.3.3': ^3.3.3
  'undici@>=6.0.0 <6.24.0': ^6.24.0
  'uuid@>=11.0.0 <11.1.1': ^11.1.1
  'uuid@>=13.0.0 <13.0.1': ^13.0.1
  'vite@>=7.0.0 <7.3.2': ^7.3.2
  'vitest@>=4.0.0 <4.1.0': ^4.1.0
  'webpack-dev-server@>=5.0.0 <5.2.4': ^5.2.4
  'ws@>=8.0.0 <8.20.1': ^8.20.1
allowBuilds:
  '@clerk/shared': false
  '@datadog/native-appsec': false
  '@datadog/native-iast-taint-tracking': false
  '@datadog/native-metrics': false
  '@datadog/pprof': false
  '@fingerprintjs/fingerprintjs-pro-react': false
  '@firebase/util': false
  '@google/genai': false
  '@nestjs/core': false
  '@parcel/watcher': false
  '@scarf/scarf': false
  '@swc/core': false
  agent-browser: false
  bufferutil: false
  cbor-extract: false
  core-js: false
  core-js-pure: false
  couchbase: false
  cpu-features: false
  dd-trace: false
  edgedriver: false
  esbuild: false
  geckodriver: false
  inngest-cli: false
  koffi: false
  msgpackr-extract: false
  msw: false
  onnxruntime-node: false
  protobufjs: false
  sharp: false
  ssh2: false
  unrs-resolver: false
  workerd: false
