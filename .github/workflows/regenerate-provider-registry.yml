name: Regenerate Providers & Docs

permissions:
  contents: read

on:
  # Run every 6 hours to keep provider registry and documentation up-to-date
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  # Allow manual triggering for testing
  workflow_dispatch:

concurrency:
  group: regenerate-providers-docs
  cancel-in-progress: false

jobs:
  regenerate:
    # Only run on the main repository, not on forks
    if: ${{ github.repository == 'mastra-ai/mastra' }}
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 30
    env:
      HUSKY: 0

    steps:
      - name: Initial checkout
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          # Use default GITHUB_TOKEN for initial checkout
          # This is needed to access the .github/actions/app-auth action
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Dane App Auth
        id: app-auth
        uses: ./.github/actions/app-auth
        with:
          client-id: ${{ vars.DANE_CLIENT_ID }}
          private-key: ${{ secrets.DANE_APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write

      - name: Re-checkout with app token
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          ref: main
          token: ${{ steps.app-auth.outputs.token }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build vendored ai-v6 package
        run: pnpm --filter @internal/ai-v6 build

      - name: Build internal core package
        # The generate:providers script imports @mastra/core source, which
        # re-exports @internal/core/error. That subpath resolves to the
        # package's dist output, so @internal/core must be built first or the
        # script fails with ERR_MODULE_NOT_FOUND.
        run: pnpm turbo build --filter @internal/core

      - name: Generate provider registry
        run: pnpm --filter @mastra/core generate:providers

      - name: Generate model documentation
        run: pnpx tsx packages/core/scripts/generate-model-docs.ts

      - name: Format generated files
        run: |
          pnpm oxfmt packages/core/src/llm/model/provider-registry.json
          pnpm oxfmt packages/core/src/llm/model/provider-types.generated.d.ts
          pnpm oxfmt packages/core/src/llm/model/capabilities/
          cd docs
          pnpm oxfmt 'src/content/en/models/**/*.{ts,js}' --ignore-path /dev/null --no-error-on-unmatched-pattern
      - name: Check for changes
        id: git-check
        run: |
          git add --intent-to-add packages/core/src/llm/model/capabilities/
          git diff --exit-code packages/core/src/llm/model/provider-registry.json packages/core/src/llm/model/provider-types.generated.d.ts packages/core/src/llm/model/capabilities/ docs/src/content/en/models/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create changeset
        if: steps.git-check.outputs.changed == 'true'
        run: |
          # Check if an automated provider registry changeset already exists
          if [ -d .changeset ]; then
            EXISTING_CHANGESET=$(ls .changeset/automated-provider-registry-*.md 2>/dev/null | head -n 1)
          else
            EXISTING_CHANGESET=""
          fi

          if [ -n "$EXISTING_CHANGESET" ]; then
            echo "Automated changeset already exists: ${EXISTING_CHANGESET}"
            echo "Skipping changeset creation to avoid spam"
            echo "CHANGESET_FILE=" >> $GITHUB_ENV
          else
            # Generate a unique changeset filename with timestamp
            CHANGESET_ID="automated-provider-registry-$(date +%Y%m%d-%H%M%S)"
            CHANGESET_FILE=".changeset/${CHANGESET_ID}.md"

            # Create changeset for @mastra/core with patch bump
            cat > "${CHANGESET_FILE}" << 'EOF'
          ---
          '@mastra/core': patch
          ---

          Update provider registry and model documentation with latest models and providers
          EOF

            echo "Created changeset: ${CHANGESET_FILE}"
            echo "CHANGESET_FILE=${CHANGESET_FILE}" >> $GITHUB_ENV
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git add packages/core/src/llm/model/provider-registry.json
          git add packages/core/src/llm/model/provider-types.generated.d.ts
          # The generator rewrites and adds per-provider capability files. These
          # must be staged too; otherwise they linger as unstaged/untracked
          # changes that abort the rebase below and never make it onto main.
          git add packages/core/src/llm/model/capabilities/
          git add docs/src/content/en/models/
          if [ -n "${CHANGESET_FILE}" ]; then
            git add "${CHANGESET_FILE}"
          fi
          git commit -m "chore: regenerate providers and docs [skip ci]"
          # Use --autostash as a safeguard so any unexpected leftover unstaged
          # changes don't abort the rebase with "cannot pull with rebase: You
          # have unstaged changes." Autostash safely stashes and restores them.
          git pull --rebase --autostash
          git push

      - name: Log summary
        if: steps.git-check.outputs.changed == 'true'
        run: echo "✅ Providers and documentation updated with changeset and committed to main"

      - name: Log no changes
        if: steps.git-check.outputs.changed != 'true'
        run: echo "ℹ️ No changes detected in providers or documentation"
