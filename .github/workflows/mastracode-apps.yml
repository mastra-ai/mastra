name: MastraCode Apps

# The mastracode/app, mastracode/web, and mastracode/desktop projects are
# standalone pnpm roots outside the turbo workspace, so the regular affected
# tests pipeline never sees them. This workflow runs their checks directly.
on:
  pull_request:
    paths:
      - 'mastracode/app/**'
      - 'mastracode/web/**'
      - 'mastracode/desktop/**'
      - '.github/workflows/mastracode-apps.yml'

permissions:
  contents: read

concurrency:
  group: mastracode-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-web:
    name: MastraCode App + Web
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 30
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: ${{ secrets.TURBO_TOKEN == '' && 'local:rw' || 'remote:rw' }}
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Cache turbo build setup
        if: ${{ env.TURBO_TOKEN == '' }}
        uses: actions/cache@v6
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Check renderer toolchain stays aligned
        run: |
          node -e '
            const fs = require("node:fs");
            const entries = ["app", "web", "desktop"]
              .map(d => [d, `mastracode/${d}/package.json`])
              .filter(([, f]) => fs.existsSync(f))
              .map(([d, f]) => [d, JSON.parse(fs.readFileSync(f, "utf8")).devDependencies?.vite])
              .filter(([, v]) => v);
            const unique = new Set(entries.map(([, v]) => v));
            if (unique.size > 1) {
              console.error("Vite versions drifted across mastracode apps (shared source must build under one toolchain):");
              for (const [d, v] of entries) console.error(`  ${d}: ${v}`);
              process.exit(1);
            }
          '

      - name: Install standalone roots
        run: |
          pnpm --dir mastracode/app install --frozen-lockfile
          pnpm --dir mastracode/web install --frozen-lockfile

      - name: Build linked monorepo packages
        run: pnpm --dir mastracode/web run prebuild

      - name: App typecheck, lint, tests
        run: |
          pnpm --dir mastracode/app run check
          pnpm --dir mastracode/app run lint
          pnpm --dir mastracode/app run test

      - name: Web typecheck, unit tests, scenario suite
        run: |
          pnpm --dir mastracode/web run check
          pnpm --dir mastracode/web exec vitest run
          pnpm --dir mastracode/web run web:test
