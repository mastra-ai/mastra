name: Sync Renovate changeset
on:
  pull_request:
    paths:
      - '.github/workflows/sync_renovate-changesets.yml'
      - '**/pnpm-lock.yaml'
      - 'examples/**/package.json'
      - 'e2e-tests/**/package.json'
      - 'packages/**/integration-tests/package.json'

jobs:
  changeset:
    runs-on: starsling-ubuntu-24.04
    if: startsWith(github.head_ref, 'renovate/') && github.repository == 'mastra-ai/mastra'
    permissions:
      pull-requests: write
    steps:
      - name: Re-checkout with app token
        uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e
        with:
          fetch-depth: 0
          token: ${{ secrets.RENOVATE_PAT  }}
          persist-credentials: true

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node
        with:
          install-dependencies: 'false'
          package-manager-cache: 'false'

      - name: Check for standalone package.json changes
        id: check-standalone-packages
        run: |
          if git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD | grep -q -E "(examples|e2e-tests|integration-tests)/.*package.json"; then
            echo "standalone_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "standalone_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        shell: bash
        run: |
          git config --global user.name 'Dane - AI (Mastra)'
          git config --global user.email '199639756+daneatmastra@users.noreply.github.com'

      - name: Create/Update Changesets
        uses: 'wardpeet/changesets-dependencies-action@f11b16181c79e07d62b112c2f32c9db534a9df09'
        env:
          GITHUB_TOKEN: ${{ secrets.RENOVATE_PAT  }}
          SKIP_CREDENTIALS: '1'
          INCLUDE_DEV_DEPS: '1'

      - name: Install dependencies
        if: steps.check-standalone-packages.outputs.standalone_changed == 'true'
        run: bash ./.github/scripts/install-deps.bash ${{ github.event.pull_request.base.sha }}

      - name: Approve PR
        run: gh pr review ${{ github.event.pull_request.number }} --approve
        env:
          GH_TOKEN: ${{ github.token }}
