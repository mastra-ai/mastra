name: Prebuild

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, 0.x]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    name: Detect code changes
    runs-on: starsling-ubuntu-24.04
    permissions:
      contents: read
    outputs:
      has_code: ${{ steps.filter.outputs.has_code }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: filter
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} \
            | grep -vE '^(docs/|examples/|\.changeset/|explorations/)' || true)
          if [ -n "$CHANGED" ]; then
            echo "has_code=true" >> $GITHUB_OUTPUT
          else
            echo "has_code=false" >> $GITHUB_OUTPUT
          fi

  prebuild:
    name: Build
    needs: changes
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 20
    if: needs.changes.outputs.has_code == 'true' && github.repository == 'mastra-ai/mastra'
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: ${{ secrets.TURBO_TOKEN == '' && 'local:rw' || 'remote:rw' }}
      NODE_OPTIONS: --max-old-space-size=8192
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Cache turbo build setup
        if: ${{ env.TURBO_TOKEN == '' }}
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build
        run: pnpm turbo --filter "!./examples/**/*" --filter "!./docs/" --filter "!./explorations/**/*" build

  unit-test:
    name: UNIT Test (Shard ${{ matrix.shard }})
    needs: [changes, prebuild]
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 30
    if: needs.changes.outputs.has_code == 'true' && github.repository == 'mastra-ai/mastra'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: ${{ secrets.TURBO_TOKEN == '' && 'local:rw' || 'remote:rw' }}
      NODE_OPTIONS: --max-old-space-size=8192
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Cache turbo build setup
        if: ${{ env.TURBO_TOKEN == '' }}
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build packages
        run: pnpm turbo build --filter "!./examples/**/*" --filter "!./docs/" --filter "!./explorations/**/*"

      - name: Run changed tests (Shard ${{ matrix.shard }}/4)
        run: |
          pnpm vitest run \
            --project 'unit:*' --project 'typecheck:*' \
            --reporter=blob \
            --reporter=verbose \
            --reporter=github-actions \
            --outputFile.blob=.vitest-reports/blob-${{ matrix.shard }}.json \
            --shard=${{ matrix.shard }}/4 \
            --passWithNoTests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: vitest-blob-${{ matrix.shard }}
          path: .vitest-reports/
          include-hidden-files: true
          retention-days: 1

  e2e-test:
    name: E2E Test (${{ matrix.project }})
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project:
          - packages/*
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: ${{ secrets.TURBO_TOKEN == '' && 'local:rw' || 'remote:rw' }}
    permissions:
      contents: read
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v5
        with:
          fetch-depth: 2
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout trusted actions from base branch
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.head_branch == '0.x' && '0.x' || 'main' }}
          sparse-checkout: .github/actions
          path: trusted-actions

      - name: Use trusted actions
        run: |
          rm -rf .github/actions
          cp -r trusted-actions/.github/actions .github/actions

      - name: Get PR base branch
        id: pr-info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/commits/${{ inputs.head_sha }}/pulls --jq '.[0]')
          BASE_REF=$(echo "$PR_DATA" | jq -r '.base.ref // "main"')
          echo "base_ref=$BASE_REF" >> $GITHUB_OUTPUT

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build packages
        run: pnpm turbo build --filter "!./examples/**/*" --filter "!./docs/" --filter "!./explorations/**/*"
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'

      - name: Normalize project name
        id: normalize
        run: echo "project_id=$(echo '${{ matrix.project }}' | tr '/' '-' | sed 's/\*/_star_/g')" >> $GITHUB_OUTPUT

      - name: Run changed tests (${{ matrix.project }})
        run: |
          pnpm vitest run \
            --project 'e2e:${{ matrix.project }}' \
            --reporter=blob \
            --reporter=verbose \
            --reporter=github-actions \
            --outputFile.blob=.vitest-reports/blob-${{ steps.normalize.outputs.project_id }}.json \
            --passWithNoTests
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          ASTRA_DB_ENDPOINT: ${{ secrets.ASTRA_DB_ENDPOINT }}
          ASTRA_DB_TOKEN: ${{ secrets.ASTRA_DB_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.ABHI_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.ABHI_CLOUDFLARE_ACCOUNT_ID }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: vitest-blob-${{ steps.normalize.outputs.project_id }}
          path: .vitest-reports/
          include-hidden-files: true
          retention-days: 1

  merge-unit-reports:
    name: Merge Unit Test Reports
    runs-on: starsling-ubuntu-24.04
    needs: unit-test
    if: always() && needs.unit-test.result != 'skipped'
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Download unit test results
        uses: actions/download-artifact@v6
        with:
          pattern: vitest-blob-*
          path: .vitest-reports
          merge-multiple: true

      - name: Merge reports
        run: pnpm vitest --merge-reports --reporter=default --reporter=github-actions --passWithNoTests
