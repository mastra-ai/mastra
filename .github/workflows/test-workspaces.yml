name: Workspace Tests

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - 'workspaces/**'
      - 'packages/core/**'
      - '.github/workflows/test-workspaces.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  setup:
    if: ${{ github.repository == 'mastra-ai/mastra' }}
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set-packages.outputs.packages }}
    steps:
      - uses: actions/checkout@v5
      - id: set-packages
        run: |
          PACKAGES=$(ls -d workspaces/*/ | grep -v '_test-utils' | xargs -I{} basename {} | jq -R -s -c 'split("\n")[:-1]')
          if [ "$PACKAGES" = "[]" ]; then
            echo "::error::No workspace packages found"
            exit 1
          fi
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT

  test-unit:
    needs: setup
    # Only run on the main repository, not on forks
    if: ${{ github.repository == 'mastra-ai/mastra' }}
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r
      MASTRA_SOURCE_MODE: '1'
      NODE_OPTIONS: --max-old-space-size=8192 --conditions=mastra-source
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.setup.outputs.packages) }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Validate source exports
        run: pnpm source-exports:check

      - name: Run ${{ matrix.package }} unit tests
        run: pnpm vitest run --project "unit:workspaces/${{ matrix.package }}" --exclude '**/*.integration.test.ts' --passWithNoTests

  test-docker:
    # Only run on the main repository, not on forks
    if: ${{ github.repository == 'mastra-ai/mastra' }}
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r
      MASTRA_SOURCE_MODE: '1'
      NODE_OPTIONS: --max-old-space-size=8192 --conditions=mastra-source
    strategy:
      fail-fast: false
      matrix:
        package: [s3, gcs, azure]
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Validate source exports
        run: pnpm source-exports:check

      - name: Start ${{ matrix.package }} test services
        run: docker compose up -d && sleep 3
        working-directory: workspaces/${{ matrix.package }}

      - name: Run ${{ matrix.package }} integration tests
        run: pnpm vitest run --project "unit:workspaces/${{ matrix.package }}" "workspaces/${{ matrix.package }}/src/**/*.integration.test.ts" --passWithNoTests

      - name: Stop ${{ matrix.package }} test services
        if: always()
        run: docker compose down -v
        working-directory: workspaces/${{ matrix.package }}
