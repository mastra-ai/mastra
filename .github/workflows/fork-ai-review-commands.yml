name: Fork AI Review Commands

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: fork-ai-review-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  ai-review:
    name: Run fork AI review command
    if: >-
      github.repository == 'mbenhamd/mastra' &&
      github.event.comment.user.login == 'mbenhamd' &&
      (contains(github.event.comment.body, '@codex') ||
       contains(github.event.comment.body, '@claude') ||
       contains(github.event.comment.body, '@gemini'))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Parse command
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body || '';
            const match = body.match(/@(codex|claude|gemini)\s+(review|plan|risks|tests)\b/i);
            if (!match) {
              core.setOutput('enabled', 'false');
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.payload.issue.number,
                body: 'I saw an AI mention, but no supported command. Use `@codex review`, `@claude review`, `@gemini plan`, `@codex risks`, or `@codex tests`.',
              });
              return;
            }

            await github.rest.reactions.createForIssueComment({
              ...context.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

            core.setOutput('enabled', 'true');
            core.setOutput('agent', match[1].toLowerCase());
            core.setOutput('command', match[2].toLowerCase());

      - name: Checkout default branch
        if: steps.parse.outputs.enabled == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        if: steps.parse.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Codex CLI
        if: steps.parse.outputs.enabled == 'true' && steps.parse.outputs.agent == 'codex'
        run: npm install -g @openai/codex

      - name: Install Claude Code
        if: steps.parse.outputs.enabled == 'true' && steps.parse.outputs.agent == 'claude'
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Gemini CLI
        if: steps.parse.outputs.enabled == 'true' && steps.parse.outputs.agent == 'gemini'
        run: npm install -g @google/gemini-cli

      - name: Run AI review
        if: steps.parse.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          AI_AGENT: ${{ steps.parse.outputs.agent }}
          AI_COMMAND: ${{ steps.parse.outputs.command }}
          AI_OUTPUT_FILE: ai-review-output.md
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/gh-ai-review-command/index.mjs

      - name: Comment AI result
        if: steps.parse.outputs.enabled == 'true' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const outputPath = process.env.AI_OUTPUT_FILE || 'ai-review-output.md';
            let body = fs.existsSync(outputPath)
              ? fs.readFileSync(outputPath, 'utf8')
              : 'AI command completed, but no output file was written.';
            if (body.length > 65000) {
              body = body.slice(0, 64900) + '\n\n_Output truncated to fit GitHub comment limits._';
            }
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.issue.number,
              body,
            });

      - name: Comment AI failure
        if: steps.parse.outputs.enabled == 'true' && failure()
        uses: actions/github-script@v7
        env:
          AI_OUTPUT_FILE: ai-review-output.md
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const fs = require('fs');
            const outputPath = process.env.AI_OUTPUT_FILE || 'ai-review-output.md';
            let detail = '';
            if (fs.existsSync(outputPath)) {
              detail = fs.readFileSync(outputPath, 'utf8');
              if (detail.length > 12000) {
                detail = detail.slice(0, 11900) + '\n\n_Output truncated._';
              }
            }
            await github.rest.reactions.createForIssueComment({
              ...context.repo,
              comment_id: context.payload.comment.id,
              content: 'confused',
            });
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.issue.number,
              body: detail || `The AI review command failed. Check the [workflow run](${process.env.RUN_URL}) for details.`,
            });
