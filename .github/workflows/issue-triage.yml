name: GH_Issue_Triage
on:
  issues:
    types: [opened, reopened]

jobs:
  issue_created:
    # Only run on the main repository, not on forks
    if: ${{ github.repository == 'mastra-ai/mastra' }}
    runs-on: starsling-ubuntu-24.04
    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Setup Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.13.0
          package-manager-cache: false

      - name: Install dependencies
        run: npm install
        working-directory: scripts/gh-issue-triage

      - name: Label Issue
        run: npx tsx index.ts
        working-directory: scripts/gh-issue-triage
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          MASTRA_BASE_URL: 'https://shrilling-scarce-finland.mastra.cloud'
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_TEAM_ID: ${{ secrets.SLACK_TEAM_ID }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          MASTRA_TRIAGE_JWT_KEY: ${{ secrets.MASTRA_TRIAGE_JWT_KEY }}
