name: GH_Issue_Triage
on:
  issues:
    types: [opened, reopened]

jobs:
  issue_created:
    # Only run on the main repository, not on forks
    if: ${{ github.repository == 'mastra-ai/mastra' }}
    runs-on: starsling-ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          persist-credentials: false

      - name: Dane App Auth
        id: app-auth
        uses: ./.github/actions/app-auth
        with:
          client-id: ${{ vars.DANE_CLIENT_ID }}
          private-key: ${{ secrets.DANE_APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          permission-issues: read

      - name: Setup Node.js 22.x
        uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Install dependencies
        run: npm install
        working-directory: scripts/gh-issue-triage

      - name: Label Issue
        run: npx tsx index.ts
        working-directory: scripts/gh-issue-triage
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ steps.app-auth.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          MASTRA_BASE_URL: ${{ vars.MASTRA_CLOUD_BASE_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_TEAM_ID: ${{ secrets.SLACK_TEAM_ID }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          MASTRA_TRIAGE_JWT_KEY: ${{ secrets.MASTRA_TRIAGE_JWT_KEY }}
