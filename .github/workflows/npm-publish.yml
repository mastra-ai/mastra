name: Publish to npm

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      publish_type:
        description: 'Type of publish/action'
        required: true
        type: choice
        options:
          - prerelease
          - stable
          - enter-prerelease
          - snapshot
        default: prerelease
      tag:
        description: 'npm tag (for snapshot: custom tag, otherwise auto-determined)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # ===========================================
  # PRERELEASE: Triggered on push to main/0.x
  # ===========================================
  prerelease:
    if: |
      github.repository == 'mastra-ai/mastra' && 
      (
        (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore: version packages') && github.event.head_commit.author.username == 'dane-ai-mastra[bot]') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_type == 'prerelease')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js 24.x
        uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4
        with:
          node-version: 24.18.0
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Verify alpha prerelease state
        run: |
          if [ ! -f .changeset/pre.json ]; then
            echo "::error::.changeset/pre.json is missing. Run the Cron Alpha Version workflow first to restore alpha prerelease mode."
            exit 1
          fi

          node <<'NODE'
          const { readFileSync } = require('node:fs');
          const { execSync } = require('node:child_process');

          const pre = JSON.parse(readFileSync('.changeset/pre.json', 'utf8'));
          if (pre.mode !== 'pre' || pre.tag !== 'alpha') {
            console.error(`Expected .changeset/pre.json to be in alpha pre mode, got mode=${pre.mode} tag=${pre.tag}`);
            process.exit(1);
          }
          NODE

      - name: Ensure npm 11.5.1+ for OIDC
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install

      - name: Run build
        run: pnpm build

      - name: Determine publish tag
        id: determine-tag
        run: |
          echo "tag=alpha" >> $GITHUB_OUTPUT

      - name: Publish packages
        run: pnpm publish -r --tag ${{ steps.determine-tag.outputs.tag }} --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: true
          REQUIRE_PACKAGE_DOCS: 'true'

      - name: Get CLI version
        id: cli-version
        run: |
          version=$(node -p 'require("./packages/cli/package.json").version')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Upload studio assets to R2 (staging)
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STUDIO_R2_ACCESS_KEY_ID_STAGING }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STUDIO_R2_ACCESS_SECRET_STAGING }}
          STUDIO_BUCKET_NAME: ${{ vars.STUDIO_R2_BUCKET_STAGING }}
          STUDIO_ENDPOINT_URL: ${{ vars.STUDIO_R2_ENDPOINT_URL_STAGING }}
        run: |
          aws s3 sync packages/cli/dist/studio "s3://${STUDIO_BUCKET_NAME}/${{ steps.cli-version.outputs.version }}/studio/" \
            --endpoint-url "${STUDIO_ENDPOINT_URL}" \
            --delete

      - name: Upload studio assets to R2 (production)
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STUDIO_R2_ACCESS_KEY_ID_PROD }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STUDIO_R2_ACCESS_SECRET_PROD }}
          STUDIO_BUCKET_NAME: ${{ vars.STUDIO_R2_BUCKET_PROD }}
          STUDIO_ENDPOINT_URL: ${{ vars.STUDIO_R2_ENDPOINT_URL_PROD }}
        run: |
          aws s3 sync packages/cli/dist/studio "s3://${STUDIO_BUCKET_NAME}/${{ steps.cli-version.outputs.version }}/studio/" \
            --endpoint-url "${STUDIO_ENDPOINT_URL}" \
            --delete

      - name: Notify linked issues (alpha available)
        if: ${{ !inputs.dry_run }}
        continue-on-error: true
        run: |
          pnpm install --ignore-workspace --ignore-scripts
          npx tsx index.ts
        working-directory: scripts/release-issue-notification
        env:
          MODE: alpha-released
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}

  # ===========================================
  # STABLE RELEASE: Manual trigger only
  # ===========================================
  stable:
    if: |
      github.repository == 'mastra-ai/mastra' && 
      github.event_name == 'workflow_dispatch' && 
      github.event.inputs.publish_type == 'stable'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Initial checkout
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Dane App Auth
        id: app-auth
        uses: ./.github/actions/app-auth
        with:
          client-id: ${{ vars.DANE_CLIENT_ID }}
          private-key: ${{ secrets.DANE_APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-issues: write

      - name: Re-checkout with app token
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          token: ${{ steps.app-auth.outputs.token }}
          fetch-depth: 0
          persist-credentials: true

      - name: Check for pre.json file existence
        id: check_files
        shell: bash
        run: |
          if [[ -f .changeset/pre.json ]]; then
            echo "files_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "files_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js 24.x
        uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4
        with:
          node-version: 24.18.0
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Ensure npm 11.5.1+ for OIDC
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Exit prerelease mode
        if: steps.check_files.outputs.files_exists == 'true'
        run: |
          pnpm changeset-cli pre exit
          pnpm changeset-cli version
          git pull
          git add -A
          git commit -m 'chore: version - exit prerelease mode' --no-verify
          git push
          pnpm install
          pnpm build
        env:
          GITHUB_TOKEN: ${{ steps.app-auth.outputs.token }}

      - name: Push version changes
        if: ${{ !inputs.dry_run }}
        run: |
          git push
          pnpm install
        env:
          GITHUB_TOKEN: ${{ steps.app-auth.outputs.token }}

      - name: Publish packages
        if: ${{ !inputs.dry_run }}
        run: pnpm publish -r --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: true
          REQUIRE_PACKAGE_DOCS: 'true'

      - name: Get CLI version
        id: cli-version
        run: |
          version=$(node -p 'require("./packages/cli/package.json").version')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Upload studio assets to R2 (staging)
        if: ${{ !inputs.dry_run }}
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STUDIO_R2_ACCESS_KEY_ID_STAGING }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STUDIO_R2_ACCESS_SECRET_STAGING }}
          STUDIO_BUCKET_NAME: ${{ vars.STUDIO_R2_BUCKET_STAGING }}
          STUDIO_ENDPOINT_URL: ${{ vars.STUDIO_R2_ENDPOINT_URL_STAGING }}
        run: |
          aws s3 sync packages/cli/dist/studio "s3://${STUDIO_BUCKET_NAME}/${{ steps.cli-version.outputs.version }}/studio/" \
            --endpoint-url "${STUDIO_ENDPOINT_URL}" \
            --delete

      # TODO: Remove continue-on-error once production CF R2 credentials are configured.
      - name: Upload studio assets to R2 (production)
        if: ${{ !inputs.dry_run }}
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STUDIO_R2_ACCESS_KEY_ID_PROD }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STUDIO_R2_ACCESS_SECRET_PROD }}
          STUDIO_BUCKET_NAME: ${{ vars.STUDIO_R2_BUCKET_PROD }}
          STUDIO_ENDPOINT_URL: ${{ vars.STUDIO_R2_ENDPOINT_URL_PROD }}
        run: |
          aws s3 sync packages/cli/dist/studio "s3://${STUDIO_BUCKET_NAME}/${{ steps.cli-version.outputs.version }}/studio/" \
            --endpoint-url "${STUDIO_ENDPOINT_URL}" \
            --delete

      - name: Updated alpha versions
        if: ${{ !inputs.dry_run }}
        run: node .github/scripts/publish-alpha-tags.js alpha

      - name: Publish packages - dry run
        if: ${{ inputs.dry_run }}
        run: pnpm publish -r --dry-run --access public --no-git-checks

      - name: Add tags
        run: |
          pnpm changeset-cli tag
          git push origin --tags

      - name: Notify linked issues (stable released)
        if: ${{ !inputs.dry_run }}
        continue-on-error: true
        run: |
          pnpm install --ignore-workspace --ignore-scripts
          npx tsx index.ts
        working-directory: scripts/release-issue-notification
        env:
          MODE: stable-released
          GITHUB_TOKEN: ${{ steps.app-auth.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}

  enter_prerelease:
    needs: stable
    if: |
      always() &&
      github.repository == 'mastra-ai/mastra' &&
      github.event_name == 'workflow_dispatch' &&
      (
        (github.event.inputs.publish_type == 'stable' && !inputs.dry_run && needs.stable.result == 'success') ||
        github.event.inputs.publish_type == 'enter-prerelease'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Initial checkout
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Dane App Auth
        id: app-auth
        uses: ./.github/actions/app-auth
        with:
          client-id: ${{ vars.DANE_CLIENT_ID }}
          private-key: ${{ secrets.DANE_APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write

      - name: Re-checkout with app token
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          token: ${{ steps.app-auth.outputs.token }}
          fetch-depth: 0
          persist-credentials: true

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js 24.x
        uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4
        with:
          node-version: 24.18.0
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install

      - name: Enter prerelease mode
        run: |
          git pull
          if [[ -f .changeset/pre.json ]]; then
            echo "Already in prerelease mode; no changes needed."
            exit 0
          fi
          pnpm changeset-cli pre enter alpha
          git add -A
          git commit -m 'chore: version - enter prerelease mode' --no-verify

      - name: Push prerelease changes
        if: ${{ !inputs.dry_run }}
        run: |
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ steps.app-auth.outputs.token }}

  # ===========================================
  # SNAPSHOT: Manual trigger only (non-main branches)
  # ===========================================
  snapshot:
    if: |
      github.repository == 'mastra-ai/mastra' && 
      github.event_name == 'workflow_dispatch' && 
      github.event.inputs.publish_type == 'snapshot' &&
      github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r
    steps:
      - name: Initial checkout
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Dane App Auth
        id: app-auth
        uses: ./.github/actions/app-auth
        with:
          client-id: ${{ vars.DANE_CLIENT_ID }}
          private-key: ${{ secrets.DANE_APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: read

      - name: Re-checkout with app token
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          token: ${{ steps.app-auth.outputs.token }}
          fetch-depth: 0
          persist-credentials: true

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js 24.x
        uses: actions/setup-node@04be95cf3511ea51ebf9f224ddfb99cc7ab87cd4
        with:
          node-version: 24.18.0
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Ensure npm 11.5.1+ for OIDC
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install

      - name: Generate slugified branch name
        id: slugify
        run: |
          BRANCH_NAME="$GITHUB_REF_NAME"
          SLUG=$(echo "$BRANCH_NAME" | iconv -t ascii//TRANSLIT | sed -r 's/[^a-zA-Z0-9]+/-/g' | sed -r 's/^-+\|-+$//g' | tr 'A-Z' 'a-z')
          echo "SLUG_BRANCH_NAME=$SLUG" >> "$GITHUB_ENV"
          echo "Slugified branch name: $SLUG"

      - name: Determine final tag
        id: determine_tag
        run: |
          if [[ -z "${{ github.event.inputs.tag }}" ]]; then
            echo "Using slugified branch name as tag: ${{ env.SLUG_BRANCH_NAME }}"
            echo "FINAL_TAG=${{ env.SLUG_BRANCH_NAME }}" >> "$GITHUB_ENV"
          else
            echo "Using provided tag: ${{ github.event.inputs.tag }}"
            echo "FINAL_TAG=${{ github.event.inputs.tag }}" >> "$GITHUB_ENV"
          fi

      - name: Update workspace dependencies
        run: |
          node <<'EOF'
          const { execSync } = require('child_process');
          const fs = require('fs');
          const workspacePackages = new Set(
            JSON.parse(execSync('pnpm m ls --depth -1 --json', { maxBuffer: 64 * 1024 * 1024 }))
              .map(pkg => pkg.name)
              .filter(Boolean),
          );
          const files = execSync('git ls-files "*/package.json"').toString().trim().split('\n');
          let changedCount = 0;
          for (const file of files) {
            const content = fs.readFileSync(file, 'utf8');
            let updated = content.replace(/"workspace:\^"/g, '"workspace:*"');
            // Only rewrite @mastra/* deps that are actual workspace packages;
            // some (e.g. @mastra/docusaurus-plugin-*) are published from other repos.
            updated = updated.replace(/"(@mastra\/[^"]*)":\s*"[^"]*"/g, (match, name) =>
              workspacePackages.has(name) ? `"${name}": "workspace:*"` : match,
            );
            if (updated !== content) {
              console.log(`Updating ${file}`);
              fs.writeFileSync(file, updated);
              changedCount++;
            }
          }
          console.log(`Finished updating workspace dependencies. ${changedCount} files updated.`);
          EOF
        shell: bash

      - name: Update lockfile
        run: pnpm install --no-frozen-lockfile --lockfile-only

      - name: Build
        run: pnpm turbo --filter "!./examples/**/*" --filter "!./docs/" build

      - name: Check for pre.json file existence
        id: check-snapshot-pre-json
        shell: bash
        run: |
          if [[ -f .changeset/pre.json ]]; then
            echo "files_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "files_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Changeset Pre Exit
        if: steps.check-snapshot-pre-json.outputs.files_exists == 'true'
        run: pnpm changeset-cli pre exit

      - name: Add snapshot-only package bumps
        run: |
          cat > .changeset/snapshot-forced-packages.md <<'EOF'
          ---
          '@mastra/observability': patch
          '@mastra/auth-studio': patch
          '@mastra/core': patch
          ---

          Include observability, auth studio, and core in snapshot publishes.
          EOF

      - name: Run Changeset Version Snapshot
        run: pnpm changeset-cli version --snapshot ${{ env.FINAL_TAG }}
        env:
          GITHUB_TOKEN: ${{ steps.app-auth.outputs.token }}

      - name: Publish to npm
        run: pnpm publish -r --no-git-checks --tag ${{ env.FINAL_TAG }} --access public
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Get CLI version
        id: cli-version
        run: |
          version=$(node -p 'require("./packages/cli/package.json").version')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Upload studio assets to R2 (staging)
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STUDIO_R2_ACCESS_KEY_ID_STAGING }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STUDIO_R2_ACCESS_SECRET_STAGING }}
          STUDIO_BUCKET_NAME: ${{ vars.STUDIO_R2_BUCKET_STAGING }}
          STUDIO_ENDPOINT_URL: ${{ vars.STUDIO_R2_ENDPOINT_URL_STAGING }}
        run: |
          aws s3 sync packages/cli/dist/studio "s3://${STUDIO_BUCKET_NAME}/${{ steps.cli-version.outputs.version }}/studio/" \
            --endpoint-url "${STUDIO_ENDPOINT_URL}" \
            --delete

      - name: Upload studio assets to R2 (production)
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STUDIO_R2_ACCESS_KEY_ID_PROD }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STUDIO_R2_ACCESS_SECRET_PROD }}
          STUDIO_BUCKET_NAME: ${{ vars.STUDIO_R2_BUCKET_PROD }}
          STUDIO_ENDPOINT_URL: ${{ vars.STUDIO_R2_ENDPOINT_URL_PROD }}
        run: |
          aws s3 sync packages/cli/dist/studio "s3://${STUDIO_BUCKET_NAME}/${{ steps.cli-version.outputs.version }}/studio/" \
            --endpoint-url "${STUDIO_ENDPOINT_URL}" \
            --delete
