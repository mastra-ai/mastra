name: Labeler

permissions:
  contents: read
  pull-requests: write

on:
  - pull_request_target

jobs:
  labeler:
    runs-on: starsling-ubuntu-24.04
    steps:
      - name: Checkout Repo
        uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e
        with:
          fetch-depth: 1
          fetch-tags: false
          filter: 'blob:none'
          show-progress: false
      - uses: actions/labeler@v6
