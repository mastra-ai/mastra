name: Workspace Cloud Tests

on:
  workflow_run:
    workflows: ['Prebuild']
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  check-changes:
    if: ${{ github.repository == 'mastra-ai/mastra' }}
    runs-on: starsling-ubuntu-24.04
    outputs:
      workspaces-changed: ${{ steps.check.outputs.workspaces-changed }}
    permissions:
      contents: read
      actions: read
      statuses: write
    steps:
      # Checkout the default branch so local actions are loaded from a trusted
      # ref, not the workflow_run head SHA which may come from an untrusted PR.
      - uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set pending status
        uses: ./.github/workflows/shared-actions/set-pr-status
        with:
          status: 'pending'
          context: 'Workspace Cloud Tests'
          description: 'Checking for changes'
          sha: ${{ github.event.workflow_run.head_sha }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          target_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Download affected-tests artifact
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: affected-tests-outputs
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: /tmp/affected-outputs
        continue-on-error: true

      - name: Check for workspace changes
        id: check
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          WORKSPACES_CHANGED=false

          # Read base/head SHAs from the prebuild artifact when available so
          # the diff targets the correct PR base. Fall back to origin/main +
          # the workflow_run head SHA when the artifact is absent.
          BASE_SHA=""
          DIFF_HEAD="$HEAD_SHA"
          if [ -f /tmp/affected-outputs/base_sha.txt ]; then
            BASE_SHA=$(cat /tmp/affected-outputs/base_sha.txt | tr -d '[:space:]')
          fi
          if [ -f /tmp/affected-outputs/head_sha.txt ]; then
            DIFF_HEAD=$(cat /tmp/affected-outputs/head_sha.txt | tr -d '[:space:]')
          fi

          # Fetch refs so the three-dot diff resolves.
          git fetch --no-tags --prune origin "$DIFF_HEAD" 2>/dev/null || true
          if [ -z "$BASE_SHA" ]; then
            git fetch --no-tags --prune origin main 2>/dev/null || true
            DIFF_RANGE="origin/main...$DIFF_HEAD"
          else
            DIFF_RANGE="$BASE_SHA...$DIFF_HEAD"
          fi

          # Check affected-tests graph output from prebuild workflow.
          # Track validity so we can fail closed if the artifact is missing
          # or contains an unexpected value (e.g. the affected-tests compute
          # step failed but the artifact was still uploaded via if: always).
          ARTIFACT_VALID=false
          if [ -f /tmp/affected-outputs/affected_workspace_tests.txt ]; then
            AFFECTED=$(cat /tmp/affected-outputs/affected_workspace_tests.txt | tr -d '[:space:]')
            if [ "$AFFECTED" = "true" ]; then
              WORKSPACES_CHANGED=true
              ARTIFACT_VALID=true
            elif [ "$AFFECTED" = "false" ]; then
              ARTIFACT_VALID=true
            fi
          fi

          # Direct path fallback for changes not covered by the affected-test
          # graph (workspace packages/configs, CI workflow edits). Core source
          # changes that affect workspace tests are already caught by the
          # affected-tests graph via cross-package alias resolution, so they
          # are not duplicated here.
          # Ignore markdown-only changes so docs/changelog-only edits don't
          # trigger.
          DIRECT=$(git diff --name-only \
            "$DIFF_RANGE" \
            | grep -vE '\.md$' \
            | grep -E '^(workspaces/|\.github/workflows/test-workspaces\.yml|\.github/workflows/secrets\.test-workspaces\.yml|\.github/workflows/prebuild\.yml)' \
            || true)

          if [ -n "$DIRECT" ]; then
            WORKSPACES_CHANGED=true
          fi

          # Fail closed: if the affected-tests artifact was unavailable or
          # invalid, graph-only workspace impacts can't be determined. If
          # there are any code changes, run the tests to be safe. When there
          # are no code changes (docs-only PR), tests are correctly skipped.
          if [ "$ARTIFACT_VALID" = "false" ]; then
            ANY_CODE=$(git diff --name-only \
              "$DIFF_RANGE" \
              | grep -vE '\.md$' \
              | grep -vE '^docs/' \
              || true)
            if [ -n "$ANY_CODE" ]; then
              WORKSPACES_CHANGED=true
            fi
          fi

          echo "workspaces-changed=$WORKSPACES_CHANGED" >> "$GITHUB_OUTPUT"

  skip-tests:
    needs: check-changes
    if: needs.check-changes.outputs.workspaces-changed == 'false'
    runs-on: starsling-ubuntu-24.04
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e
      - name: Set success status for unchanged workspaces
        uses: ./.github/workflows/shared-actions/set-pr-status
        with:
          status: 'success'
          context: 'Workspace Cloud Tests'
          description: 'Workspace packages unchanged - skipping tests'
          sha: ${{ github.event.workflow_run.head_sha }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          target_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  setup:
    needs: check-changes
    if: ${{ needs.check-changes.outputs.workspaces-changed == 'true' && github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: starsling-ubuntu-24.04
    permissions:
      contents: read
    outputs:
      packages: ${{ steps.set-packages.outputs.packages }}
    steps:
      - uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - id: set-packages
        run: |
          PACKAGES=$(ls -d workspaces/*/ | grep -v '_test-utils' | xargs -I{} basename {} | jq -R -s -c 'split("\n")[:-1]')
          if [ "$PACKAGES" = "[]" ]; then
            echo "::error::No workspace packages found"
            exit 1
          fi
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT

  test-cloud:
    needs: [check-changes, setup]
    if: ${{ github.repository == 'mastra-ai/mastra' && needs.check-changes.outputs.workspaces-changed == 'true' && github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.setup.outputs.packages) }}
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r
    steps:
      - uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build packages
        run: pnpm turbo build --filter "@mastra/${{ matrix.package }}"
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'

      - name: Run ${{ matrix.package }} cloud integration tests
        run: pnpm test:cloud
        working-directory: workspaces/${{ matrix.package }}
        env:
          NODE_OPTIONS: '--max_old_space_size=8192'
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          BL_API_KEY: ${{ secrets.BL_API_KEY }}
          BL_WORKSPACE: ${{ secrets.BL_WORKSPACE }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          GCS_SERVICE_ACCOUNT_KEY: ${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}
          TEST_GCS_BUCKET: ${{ secrets.TEST_GCS_BUCKET }}

  test-success:
    needs: [check-changes, setup, test-cloud]
    if: ${{ always() && needs.check-changes.outputs.workspaces-changed == 'true' && needs.test-cloud.result == 'success' }}
    runs-on: starsling-ubuntu-24.04
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e
      - name: Set success status for completed tests
        uses: ./.github/workflows/shared-actions/set-pr-status
        with:
          status: 'success'
          context: 'Workspace Cloud Tests'
          description: 'All workspace cloud tests passed'
          sha: ${{ github.event.workflow_run.head_sha }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          target_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  test-failure:
    needs: [check-changes, setup, test-cloud]
    if: ${{ always() && needs.check-changes.outputs.workspaces-changed == 'true' && (needs.setup.result == 'failure' || needs.test-cloud.result == 'failure') }}
    runs-on: starsling-ubuntu-24.04
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e
      - name: Set failure status for failed tests
        uses: ./.github/workflows/shared-actions/set-pr-status
        with:
          status: 'failure'
          context: 'Workspace Cloud Tests'
          description: 'One or more workspace cloud tests failed'
          sha: ${{ github.event.workflow_run.head_sha }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          target_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  test-skipped:
    needs: [check-changes, setup, test-cloud]
    if: ${{ always() && needs.check-changes.outputs.workspaces-changed == 'true' && needs.setup.result != 'failure' && needs.test-cloud.result == 'skipped' }}
    runs-on: starsling-ubuntu-24.04
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e
      - name: Set status for skipped tests
        uses: ./.github/workflows/shared-actions/set-pr-status
        with:
          status: 'success'
          context: 'Workspace Cloud Tests'
          description: 'Cloud tests skipped (fork PR or setup issue)'
          sha: ${{ github.event.workflow_run.head_sha }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          target_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
