name: Quality assurance

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [main, 0.x]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_code: ${{ steps.filter.outputs.has_code }}
      has_examples: ${{ steps.filter.outputs.has_examples }}
      run_full_suite: ${{ steps.full.outputs.run_full_suite }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: filter
        run: |
          # On workflow_dispatch there is no PR context — assume everything changed.
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "has_code=true" >> $GITHUB_OUTPUT
            echo "has_examples=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          ALL=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})

          CODE=$(echo "$ALL" | grep -vE '^(docs/|examples/|\.changeset/|explorations/)' || true)
          if [ -n "$CODE" ]; then
            echo "has_code=true" >> $GITHUB_OUTPUT
          else
            echo "has_code=false" >> $GITHUB_OUTPUT
          fi

          EXAMPLES=$(echo "$ALL" | grep -E '^examples/' || true)
          if [ -n "$EXAMPLES" ]; then
            echo "has_examples=true" >> $GITHUB_OUTPUT
          else
            echo "has_examples=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine if full suite should run
        id: full
        env:
          PR_USER: ${{ github.event.pull_request.user.login }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          # Run the full lint suite on:
          # - manual workflow_dispatch
          # - the dane-ai-mastra bot's "version packages" PR (final gate before publish)
          # - any PR with the "ci:full" label
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run_full_suite=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [[ "$PR_USER" == "dane-ai-mastra"* ]] && [[ "$PR_TITLE" == "chore: version packages"* ]]; then
            echo "run_full_suite=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if echo "$LABELS" | grep -q '"ci:full"'; then
            echo "run_full_suite=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "run_full_suite=false" >> $GITHUB_OUTPUT

  lint:
    name: Lint
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: needs.changes.outputs.has_code == 'true' && github.repository == 'mastra-ai/mastra'
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:rw
    permissions:
      pull-requests: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Lint
        run: pnpm turbo --filter "!./examples/**/*" --filter "!./docs/**/*" --filter "!./explorations/**/*" --filter "!@internal/playground" lint
      - name: Format
        run: pnpm prettier --check . '!docs/**/*' '!examples/**/*' '!explorations/**/*'

  check-bundle:
    name: Validate build outputs
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Heavy: full repo build + bundle test. Only run on the alpha "version packages"
    # PR, on PRs labeled "ci:full", or on manual dispatch. Day-to-day PRs skip this.
    if: needs.changes.outputs.run_full_suite == 'true' && needs.changes.outputs.has_code == 'true' && github.repository == 'mastra-ai/mastra'
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r
    permissions:
      pull-requests: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm turbo --filter "!./examples/**/*" --filter "!./docs/" --filter "!./explorations/**/*" build

      - name: Install test dependencies
        working-directory: ./e2e-tests/pkg-outputs
        run: pnpm install --ignore-workspace

      - name: Check bundles
        working-directory: ./e2e-tests/pkg-outputs
        run: pnpm test

  validator:
    name: Validate examples packages.json
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: needs.changes.outputs.has_examples == 'true' && github.repository == 'mastra-ai/mastra'
    permissions:
      pull-requests: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node
        with:
          package-manager-cache: false
          install-dependencies: false

      - name: Install dependencies
        run: pnpm --config.trust-policy=no-check add -w --no-lockfile globby

      - name: Run examples validator
        run: node .github/scripts/validate-examples.js

  agents-md-check:
    name: Validate AGENTS.md files
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.repository == 'mastra-ai/mastra'
    permissions:
      pull-requests: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node
        with:
          package-manager-cache: false

      - name: Run AGENTS.md validator
        run: node .github/scripts/validate-agents-md.mjs

  peerdeps-check:
    name: Validate peer dependencies
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Heavy: runs `changeset version` then validates peer deps. Only run on the
    # alpha "version packages" PR (where peerdep drift actually matters before
    # publish), on PRs labeled "ci:full", or on manual dispatch.
    if: needs.changes.outputs.run_full_suite == 'true' && github.repository == 'mastra-ai/mastra'
    permissions:
      pull-requests: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          # Fetch entire git history so Changesets can generate changelogs
          # with the correct commits
          fetch-depth: 0

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node
        with:
          package-manager-cache: false
          install-dependencies: false

      - name: Install dependencies
        run: pnpm --config.trust-policy=no-check add -w --no-lockfile semver

      - name: bump versions
        run: npx changeset version

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit changes
        run: git commit -am "Bump versions" || true

      - name: Run peerdeps validator
        run: node ./scripts/validate-peerdeps.mjs

      - name: Check for git changes
        run: |
          if ! git diff --quiet --ignore-space-at-eol -- ':!package.json' || ! git diff --cached --quiet --ignore-space-at-eol -- ':!package.json'; then
            echo "Error: Peerdependency mismatch"
            echo "The following files have been modified:"
            git diff --name-only -- ':!package.json'
            exit 1
          fi

  validate-pkg-json:
    name: Validate package.json files
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.changes.outputs.has_code == 'true' && github.repository == 'mastra-ai/mastra'
    permissions:
      pull-requests: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v5
        with:
          node-version: 22.13.0
          package-manager-cache: false

      - name: Run package.json validator
        run: node .github/scripts/validate-pkg-json.mjs
