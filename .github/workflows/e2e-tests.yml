name: E2E Tests

on:
  workflow_call:
    inputs:
      head_sha:
        required: true
        type: string
    secrets:
      TURBO_TOKEN:
        required: false
      TURBO_TEAM:
        required: false

permissions: {}

jobs:
  publish-e2e-registry:
    name: Publish E2E registry
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r
      MASTRA_E2E_REGISTRY_TAG: e2e-ci-${{ github.run_id }}-${{ github.run_attempt }}
      MASTRA_E2E_REGISTRY_PORT: '4873'

    steps:
      - name: Checkout repo
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          ref: ${{ inputs.head_sha }}
          persist-credentials: false

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build packages
        run: pnpm build

      - name: Install registry setup dependencies
        working-directory: ./e2e-tests/_local-registry-setup
        # No --ignore-workspace: the directory has its own pnpm-workspace.yaml
        # (its workspace root), which also holds the security overrides that
        # must be read for the lockfile config to match.
        run: pnpm install --frozen-lockfile

      - name: Publish packages to local registry storage
        working-directory: ./e2e-tests/_local-registry-setup
        run: pnpm run publish-ci-registry
        env:
          MASTRA_E2E_REGISTRY_DIR: ${{ runner.temp }}/mastra-e2e-registry
          MASTRA_E2E_REGISTRY_STORAGE: ${{ runner.temp }}/mastra-e2e-registry/storage
          MASTRA_E2E_REGISTRY_CONFIG: ${{ runner.temp }}/mastra-e2e-registry/verdaccio.yaml

      - name: Upload E2E registry artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-verdaccio-registry
          path: ${{ runner.temp }}/mastra-e2e-registry
          retention-days: 1

  e2e-monorepo:
    needs: publish-e2e-registry
    name: E2E monorepo
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm turbo --filter "./packages/core" --filter "./packages/cli" build

      - name: Install e2e test dependencies
        working-directory: ./e2e-tests/monorepo
        run: pnpm install

      - name: Download E2E registry artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: e2e-verdaccio-registry
          path: ${{ runner.temp }}/mastra-e2e-registry

      - name: Test
        working-directory: ./e2e-tests/monorepo
        run: pnpm test
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE_EXCLUDE: '["@mastra/*", "mastra", "create-mastra"]'
          MASTRA_E2E_REGISTRY_STORAGE: ${{ runner.temp }}/mastra-e2e-registry/storage
          MASTRA_E2E_REGISTRY_CONFIG: ${{ runner.temp }}/mastra-e2e-registry/verdaccio.yaml
          MASTRA_E2E_REGISTRY_TAG: e2e-ci-${{ github.run_id }}-${{ github.run_attempt }}
          MASTRA_E2E_REGISTRY_PORT: '4873'

  e2e-softwarefactory:
    needs: publish-e2e-registry
    name: E2E softwarefactory template
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Install and build the CLI
        run: |
          pnpm install --frozen-lockfile --filter ./mastracode/mastra-factory...
          pnpm --filter ./mastracode/mastra-factory build

      - name: Install e2e test dependencies
        working-directory: ./e2e-tests/softwarefactory
        run: pnpm install

      - name: Download E2E registry artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: e2e-verdaccio-registry
          path: ${{ runner.temp }}/mastra-e2e-registry

      - name: Test
        working-directory: ./e2e-tests/softwarefactory
        run: pnpm test
        env:
          MASTRA_TELEMETRY_DISABLED: '1'
          MASTRA_E2E_REGISTRY_STORAGE: ${{ runner.temp }}/mastra-e2e-registry/storage
          MASTRA_E2E_REGISTRY_CONFIG: ${{ runner.temp }}/mastra-e2e-registry/verdaccio.yaml
          MASTRA_E2E_REGISTRY_TAG: softwarefactory-e2e-test
          MASTRA_E2E_REGISTRY_PORT: '4873'

  e2e-no-bundling:
    needs: publish-e2e-registry
    name: E2E no-bundling
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm turbo --filter "@mastra/core" --filter "@mastra/evals" --filter "@mastra/libsql" --filter "@mastra/loggers" --filter "@mastra/memory" --filter "@mastra/observability" --filter "mastra" build

      - name: Install e2e test dependencies
        working-directory: ./e2e-tests/no-bundling
        run: pnpm install

      - name: Download E2E registry artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: e2e-verdaccio-registry
          path: ${{ runner.temp }}/mastra-e2e-registry

      - name: Test
        working-directory: ./e2e-tests/no-bundling
        run: pnpm test
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE_EXCLUDE: '["@mastra/*", "mastra", "create-mastra"]'
          MASTRA_E2E_REGISTRY_STORAGE: ${{ runner.temp }}/mastra-e2e-registry/storage
          MASTRA_E2E_REGISTRY_CONFIG: ${{ runner.temp }}/mastra-e2e-registry/verdaccio.yaml
          MASTRA_E2E_REGISTRY_TAG: e2e-ci-${{ github.run_id }}-${{ github.run_attempt }}
          MASTRA_E2E_REGISTRY_PORT: '4873'

  e2e-create-mastra:
    needs: publish-e2e-registry
    name: E2E create-mastra
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm turbo --filter "create-mastra" build

      - name: Install e2e test dependencies
        working-directory: ./e2e-tests/create-mastra
        run: pnpm install

      - name: Download E2E registry artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: e2e-verdaccio-registry
          path: ${{ runner.temp }}/mastra-e2e-registry

      - name: Test
        working-directory: ./e2e-tests/create-mastra
        run: pnpm test
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE_EXCLUDE: '["@mastra/*", "mastra", "create-mastra"]'
          MASTRA_E2E_REGISTRY_STORAGE: ${{ runner.temp }}/mastra-e2e-registry/storage
          MASTRA_E2E_REGISTRY_CONFIG: ${{ runner.temp }}/mastra-e2e-registry/verdaccio.yaml
          MASTRA_E2E_REGISTRY_TAG: e2e-ci-${{ github.run_id }}-${{ github.run_attempt }}
          MASTRA_E2E_REGISTRY_PORT: '4873'

  e2e-commonjs:
    needs: publish-e2e-registry
    name: E2E CommonJS
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm turbo --filter "@mastra/core" --filter "@mastra/loggers" build

      - name: Install e2e test dependencies
        working-directory: ./e2e-tests/commonjs
        run: pnpm install

      - name: Download E2E registry artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: e2e-verdaccio-registry
          path: ${{ runner.temp }}/mastra-e2e-registry

      - name: Test
        working-directory: ./e2e-tests/commonjs
        run: pnpm test
        env:
          MASTRA_E2E_REGISTRY_STORAGE: ${{ runner.temp }}/mastra-e2e-registry/storage
          MASTRA_E2E_REGISTRY_CONFIG: ${{ runner.temp }}/mastra-e2e-registry/verdaccio.yaml
          MASTRA_E2E_REGISTRY_TAG: e2e-ci-${{ github.run_id }}-${{ github.run_attempt }}
          MASTRA_E2E_REGISTRY_PORT: '4873'

  e2e-deployers:
    needs: publish-e2e-registry
    name: E2E deployers
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm build

      - name: Install e2e test dependencies
        working-directory: ./e2e-tests/deployers
        run: pnpm install

      - name: Download E2E registry artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: e2e-verdaccio-registry
          path: ${{ runner.temp }}/mastra-e2e-registry

      - name: Test
        working-directory: ./e2e-tests/deployers
        run: pnpm test
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE_EXCLUDE: '["@mastra/*", "mastra", "create-mastra"]'
          MASTRA_E2E_REGISTRY_STORAGE: ${{ runner.temp }}/mastra-e2e-registry/storage
          MASTRA_E2E_REGISTRY_CONFIG: ${{ runner.temp }}/mastra-e2e-registry/verdaccio.yaml
          MASTRA_E2E_REGISTRY_TAG: e2e-ci-${{ github.run_id }}-${{ github.run_attempt }}
          MASTRA_E2E_REGISTRY_PORT: '4873'

  e2e-type-check:
    needs: publish-e2e-registry
    name: E2E Type check
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm build

      - name: Install e2e test type-check
        working-directory: ./e2e-tests/type-check
        run: pnpm install

      - name: Download E2E registry artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: e2e-verdaccio-registry
          path: ${{ runner.temp }}/mastra-e2e-registry

      - name: Test
        working-directory: ./e2e-tests/type-check
        run: pnpm test
        env:
          MASTRA_E2E_REGISTRY_STORAGE: ${{ runner.temp }}/mastra-e2e-registry/storage
          MASTRA_E2E_REGISTRY_CONFIG: ${{ runner.temp }}/mastra-e2e-registry/verdaccio.yaml
          MASTRA_E2E_REGISTRY_TAG: e2e-ci-${{ github.run_id }}-${{ github.run_attempt }}
          MASTRA_E2E_REGISTRY_PORT: '4873'

  e2e-kitchen-sink:
    name: E2E kitchen-sink (${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: >-
          pnpm turbo
          --filter "@mastra/core"
          --filter "mastra"
          --filter "@mastra/editor"
          --filter "@mastra/memory"
          --filter "@mastra/libsql"
          --filter "@mastra/loggers"
          --filter "@mastra/mcp"
          --filter "@internal/playground"
          build

      - name: Setup e2e project dependencies
        working-directory: ./packages/playground
        run: pnpm test:e2e:setup

      - name: Test E2E
        working-directory: ./packages/playground
        run: pnpm exec playwright test -c e2e/playwright.config.ts --shard=${{ matrix.shard }}/${{ strategy.job-total }}

  e2e-client-js:
    name: E2E client-js (optional)
    runs-on: starsling-ubuntu-24.04
    timeout-minutes: 15
    continue-on-error: true
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:r

    steps:
      - name: Checkout repo
        uses: actions/checkout@e8d4307400f9427dba7cb98e488d6ab85f1cec5f
        with:
          ref: ${{ inputs.head_sha }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm build

      - name: Test client-js zod-v3
        run: pnpm --filter "client-js-e2e-tests-zod-v3" test

      - name: Test client-js zod-v4
        run: pnpm --filter "client-js-e2e-tests-zod-v4" test
