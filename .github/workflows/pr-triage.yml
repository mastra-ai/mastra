name: PR Triage

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - edited
      - synchronize
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  issue-link-nudge:
    if: ${{ github.repository == 'mastra-ai/mastra' && github.event_name == 'pull_request_target' && github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout automation scripts
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            .github/actions
            scripts/pr-issue-link
          sparse-checkout-cone-mode: false

      - name: Generate GitHub App token
        id: app_token
        uses: ./.github/actions/app-auth
        with:
          app-id: ${{ vars.DANE_APP_ID }}
          private-key: ${{ secrets.DANE_APP_PRIVATE_KEY }}

      - name: Setup pnpm and node
        uses: ./.github/actions/setup-pnpm-node
        with:
          install-dependencies: false
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --ignore-workspace
        working-directory: scripts/pr-issue-link

      - name: Enforce linked issue
        run: npx tsx index.ts
        working-directory: scripts/pr-issue-link
        env:
          MODE: nudge
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          STALE_DAYS: ${{ vars.PR_NEEDS_ISSUE_STALE_DAYS || '1' }}

  close-stale-unlinked:
    if: ${{ github.repository == 'mastra-ai/mastra' && github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout automation scripts
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            .github/actions
            scripts/pr-issue-link
          sparse-checkout-cone-mode: false

      - name: Generate GitHub App token
        id: app_token
        uses: ./.github/actions/app-auth
        with:
          app-id: ${{ vars.DANE_APP_ID }}
          private-key: ${{ secrets.DANE_APP_PRIVATE_KEY }}

      - name: Setup pnpm and node
        uses: ./.github/actions/setup-pnpm-node
        with:
          install-dependencies: false
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --ignore-workspace
        working-directory: scripts/pr-issue-link

      - name: Close stale PRs without linked issues
        run: npx tsx index.ts
        working-directory: scripts/pr-issue-link
        env:
          MODE: close-stale
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          STALE_DAYS: ${{ vars.PR_NEEDS_ISSUE_STALE_DAYS || '1' }}
