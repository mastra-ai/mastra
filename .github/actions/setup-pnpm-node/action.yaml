name: Setup pnpm and Node.js
description: Setup pnpm with custom registry and Node.js with cache

inputs:
  install-dependencies:
    description: 'Whether to run pnpm install after setup'
    required: false
    default: 'true'
  package-manager-cache:
    description: 'Should use package manager cache'
    required: false
    default: 'true'
  package-json-file:
    description: 'Path to package.json for reading packageManager version (useful when checkout is not at workspace root)'
    required: false
    default: ''
  cache-dependency-path:
    description: 'Path to pnpm-lock.yaml for cache key (useful when checkout is not at workspace root)'
    required: false
    default: ''
  version:
    description: 'Explicit pnpm version (overrides packageManager detection)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup Node.js 22.x
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: 22.13.0

    # Let pnpm/action-setup handle store caching instead of actions/setup-node.
    # setup-node's cache: 'pnpm' runs `pnpm store path --silent` which returns
    # a bogus path on self-hosted runners where pnpm is installed into
    # ~/setup-pnpm/node_modules/.bin/.
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      name: Install pnpm
      with:
        version: ${{ inputs.version || '' }}
        run_install: false
        package_json_file: ${{ inputs.package-json-file || 'package.json' }}
        cache: ${{ inputs.package-manager-cache == 'true' }}
        cache_dependency_path: ${{ inputs.cache-dependency-path || 'pnpm-lock.yaml' }}

    - name: Reset corrupt pnpm store cache
      shell: bash
      run: |
        set +e
        store_path=$(pnpm store path --silent)
        pnpm store status >/tmp/pnpm-store-status.log 2>&1
        status=$?
        set -e

        if [ "$status" -ne 0 ] && grep -q "database disk image is malformed" /tmp/pnpm-store-status.log; then
          echo "Detected corrupt pnpm store cache at $store_path; removing restored store."
          rm -rf "$store_path"
        elif [ "$status" -ne 0 ]; then
          cat /tmp/pnpm-store-status.log
          exit "$status"
        fi

    - name: Install dependencies
      if: ${{ inputs.install-dependencies == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile
