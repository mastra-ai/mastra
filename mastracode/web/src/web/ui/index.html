<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MastraCode — Web</title>
    <link rel="icon" type="image/svg+xml" href="/mastra.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#000000" />
    <script>
      // Apply the persisted/system theme class before paint to avoid a flash.
      // Mirrors @mastra/playground-ui's ThemeProvider, which keys off the
      // `.dark`/`.light` class on <html> and stores the raw theme string
      // ('dark' | 'light' | 'system') under `mastracode.theme`.
      (function () {
        try {
          var stored = localStorage.getItem('mastracode.theme');
          var resolved;
          if (stored === 'dark' || stored === 'light') {
            resolved = stored;
          } else if (stored === 'system') {
            resolved =
              window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          } else {
            // No stored preference: match ThemeProvider's defaultTheme="dark".
            resolved = 'dark';
          }
          document.documentElement.classList.add(resolved);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
