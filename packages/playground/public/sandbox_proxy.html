<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MCP App Sandbox</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <script>
    // MCP Apps sandbox proxy — receives HTML content from the host via postMessage
    // and renders it securely. Used by @mcp-ui/client's AppRenderer.
    window.addEventListener('message', function(event) {
      var data = event.data;
      if (!data || typeof data !== 'object') return;

      // Handle resource ready notification (HTML content to render)
      if (data.method === 'ui/notifications/sandbox-resource-ready') {
        var html = (data.params || {}).html;
        if (html) {
          document.open();
          document.write(html);
          document.close();
        }
      }
    });

    // Signal that the sandbox proxy is ready to receive content
    window.parent.postMessage({
      jsonrpc: '2.0',
      method: 'ui/notifications/sandbox-ready',
      params: {}
    }, '*');
  </script>
</body>
</html>
