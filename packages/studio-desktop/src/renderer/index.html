<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self' http://127.0.0.1:* http://localhost:* https:; frame-src http://127.0.0.1:* http://localhost:* https:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mastra Studio</title>
  </head>
  <body>
    <div id="app">
      <section id="boot-loader" class="boot-loader" aria-label="Loading Mastra Studio"></section>
      <div class="chrome">
        <div id="tab-strip" class="tab-strip"></div>
      </div>
      <main class="surface">
        <section id="launcher" class="launcher" hidden></section>
        <section id="webviews" class="webviews"></section>
      </main>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
